<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sales Dashboard</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --muted: #6b7280; --card: #f6f7f9;
    --border: #e5e7eb; --up: #16a34a; --down: #dc2626; --accent: #4f46e5;
  }
  [data-theme="dark"] {
    --bg: #14151a; --fg: #e7e9ee; --muted: #9aa0ac; --card: #1d1f27;
    --border: #2a2d37; --up: #34d399; --down: #f87171; --accent: #818cf8;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--fg);
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    padding: 16px;
  }
  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; gap: 8px; }
  h1 { font-size: 16px; margin: 0; font-weight: 600; }
  select {
    background: var(--card); color: var(--fg); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 10px; font-size: 13px;
  }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px; }
  .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
  .value { font-size: 22px; font-weight: 700; margin-top: 6px; }
  .delta { font-size: 12px; margin-top: 6px; font-weight: 600; }
  .delta.up { color: var(--up); } .delta.down { color: var(--down); }
  .meta { color: var(--muted); font-size: 12px; margin-top: 12px; }
  .state { color: var(--muted); padding: 24px 8px; text-align: center; }
  .err { color: var(--down); }
</style>
</head>
<body>
<header>
  <h1>Sales Dashboard</h1>
  <select id="period" aria-label="Period">
    <option value="day">Today</option>
    <option value="week">This Week</option>
    <option value="month" selected>This Month</option>
    <option value="quarter">This Quarter</option>
    <option value="year">This Year</option>
  </select>
</header>
<div id="app"><div class="state">Loading sales data…</div></div>

<script>
(function () {
  "use strict";
  var rpcId = 0, pending = {};
  var host = window.parent;

  function send(msg) { host.postMessage(msg, "*"); }

  function request(method, params) {
    return new Promise(function (resolve, reject) {
      var id = ++rpcId;
      pending[id] = { resolve: resolve, reject: reject };
      send({ jsonrpc: "2.0", id: id, method: method, params: params || {} });
      setTimeout(function () {
        if (pending[id]) { delete pending[id]; reject(new Error("timeout: " + method)); }
      }, 15000);
    });
  }

  function notify(method, params) {
    send({ jsonrpc: "2.0", method: method, params: params || {} });
  }

  window.addEventListener("message", function (ev) {
    var m = ev.data;
    if (!m || m.jsonrpc !== "2.0") return;

    // Response to one of our requests
    if (m.id !== undefined && (m.result !== undefined || m.error !== undefined)) {
      var p = pending[m.id];
      if (!p) return;
      delete pending[m.id];
      if (m.error) p.reject(new Error(m.error.message || "rpc error"));
      else p.resolve(m.result);
      return;
    }

    // Host pushes the result of the tool that opened this app
    if (m.method === "ui/notifications/tool-result") {
      var data = (m.params && m.params.structuredContent) || extractJson(m.params);
      if (data) render(data);
    }
  });

  function extractJson(params) {
    try {
      var c = params && params.content;
      if (c && c[0] && c[0].text) return JSON.parse(c[0].text);
    } catch (e) {}
    return null;
  }

  function money(n) {
    var v = Number(n || 0);
    return v.toLocaleString(undefined, { style: "currency", currency: "USD", maximumFractionDigits: 0 });
  }

  function deltaHtml(change) {
    if (!change) return "";
    var pct = typeof change === "object" ? (change.percent || 0) : Number(change);
    var up = pct >= 0;
    var sign = up ? "▲" : "▼";
    return '<div class="delta ' + (up ? "up" : "down") + '">' + sign + " " + Math.abs(pct) + "% vs prev</div>";
  }

  function card(label, value, change) {
    return '<div class="card"><div class="label">' + label + '</div>' +
           '<div class="value">' + value + '</div>' + deltaHtml(change) + '</div>';
  }

  function render(d) {
    if (!d || !d.current) { return; }
    var cur = d.current, ch = d.change || {};
    var html = '<div class="grid">' +
      card("Revenue", money(cur.revenue), ch.revenue) +
      card("Orders", Number(cur.orders || 0).toLocaleString(), ch.orders) +
      card("Avg Order", money(cur.avg_order_value), ch.avg_order_value) +
    '</div>' +
    '<div class="meta">Period: <b>' + (d.period || "") + '</b> &middot; ' +
      (d.date_from || "") + " → " + (d.date_to || "") + '</div>';
    document.getElementById("app").innerHTML = html;
  }

  function showState(text, isErr) {
    document.getElementById("app").innerHTML =
      '<div class="state' + (isErr ? " err" : "") + '">' + text + '</div>';
  }

  function loadPeriod(period) {
    showState("Loading sales data…");
    request("tools/call", { name: "report_sales", arguments: { period: period } })
      .then(function (res) {
        var data = (res && res.structuredContent) || extractJson(res);
        if (data) render(data);
        else showState("No data returned.", true);
      })
      .catch(function (e) { showState("Could not load: " + e.message, true); });
  }

  document.getElementById("period").addEventListener("change", function (e) {
    loadPeriod(e.target.value);
  });

  // Handshake
  request("ui/initialize", {
    appInfo: { name: "xcart-sales-dashboard", version: "1.0.0" },
    appCapabilities: {}
  }).then(function (result) {
    try {
      var theme = result && result.hostContext && result.hostContext.theme;
      if (theme) document.documentElement.setAttribute("data-theme", theme);
    } catch (e) {}
    notify("ui/notifications/initialized", {});
    // If the host doesn't push tool-result shortly, fetch it ourselves.
    setTimeout(function () {
      if (document.querySelector("#app .state")) loadPeriod(document.getElementById("period").value);
    }, 800);
  }).catch(function () {
    // Standalone / unsupported host: show a hint instead of hanging.
    showState("This is an MCP App. Open it from an MCP Apps–capable client to see live sales data.");
  });
})();
</script>
</body>
</html>
